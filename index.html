<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGPT</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-weight:bold;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  max-width:800px;
  margin:auto;
  width:100%;
}

.msg{
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  line-height:1.5;
  animation:fade 0.3s ease;
  white-space:pre-wrap;
}

.user{
  background:#2563eb;
  margin-left:auto;
  max-width:80%;
}

.ai{
  background:#1e293b;
  max-width:80%;
}

/* INPUT */
.inputbox{
  display:flex;
  padding:15px;
  background:#020617;
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
}

button{
  margin-left:10px;
  padding:14px 20px;
  border:none;
  background:#38bdf8;
  border-radius:12px;
  cursor:pointer;
}

/* TYPING */
.typing span{
  display:inline-block;
  width:6px;
  height:6px;
  margin:2px;
  background:white;
  border-radius:50%;
  animation:blink 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}
</style>
</head>

<body>

<div class="header">SmartGPT</div>

<div class="chat" id="chat"></div>

<div class="inputbox">
  <input id="input" placeholder="Ask anything..." onkeypress="if(event.key==='Enter')send()">
  <button onclick="send()">Send</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwgsVWUOju0OHwkDQpWss-_0ktI4_2Nmv5KgNxhD69bJKjIomLYoK-fFtFe8p8bxdnD9A/exec"

const chat = document.getElementById("chat")

function addMsg(text,type){
  const div = document.createElement("div")
  div.className = "msg "+type
  div.textContent = text
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

function typing(){
  const div = document.createElement("div")
  div.className="msg ai"
  div.id="typing"
  div.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`
  chat.appendChild(div)
}

function removeTyping(){
  const t=document.getElementById("typing")
  if(t) t.remove()
}

async function send(){

  const input = document.getElementById("input")
  const msg = input.value.trim()

  if(!msg) return

  addMsg(msg,"user")
  input.value=""

  typing()

  try{

    // ✅ FIX: GET request use karo
    const url = API + "?msg=" + encodeURIComponent(msg)

    const res = await fetch(url)

    const data = await res.json()

    removeTyping()

    addMsg(data.reply,"ai")

  }catch(err){

    removeTyping()
    addMsg("⚠️ API not responding","ai")
    console.log(err)

  }

}

</script>

</body>
</html>
