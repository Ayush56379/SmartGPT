<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGPT</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:rgba(2,6,23,0.8);
  backdrop-filter:blur(10px);
  padding:15px;
  display:flex;
  flex-direction:column;
  border-right:1px solid #1e293b;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#38bdf8;
}

.newchat{
  margin-top:20px;
  padding:10px;
  background:#1e293b;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
  transition:.3s;
}

.newchat:hover{
  background:#334155;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:15px;
  border-bottom:1px solid #1e293b;
  background:rgba(2,6,23,0.6);
  backdrop-filter:blur(10px);
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.msg{
  max-width:70%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  animation:fade 0.3s ease;
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.ai{
  background:#1e293b;
}

/* INPUT */
.inputbox{
  display:flex;
  padding:15px;
  border-top:1px solid #1e293b;
  background:rgba(2,6,23,0.6);
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  margin-left:10px;
  padding:12px 18px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.05);
}

/* TYPING */
.typing span{
  display:inline-block;
  width:6px;
  height:6px;
  margin:2px;
  background:white;
  border-radius:50%;
  animation:blink 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">SmartGPT</div>
  <div class="newchat" onclick="newChat()">+ New Chat</div>
</div>

<div class="main">

  <div class="header">SmartGPT AI</div>

  <div class="chat" id="chat"></div>

  <div class="inputbox">
    <input id="input" placeholder="Ask anything..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwgsVWUOju0OHwkDQpWss-_0ktI4_2Nmv5KgNxhD69bJKjIomLYoK-fFtFe8p8bxdnD9A/exec"

const chat = document.getElementById("chat")

function addMsg(text,type){
  const div = document.createElement("div")
  div.className = "msg "+type
  div.innerText = text
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

function typing(){
  const div = document.createElement("div")
  div.className="msg ai"
  div.id="typing"
  div.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`
  chat.appendChild(div)
}

function removeTyping(){
  const t=document.getElementById("typing")
  if(t) t.remove()
}

async function send(){

  const input = document.getElementById("input")
  const msg = input.value.trim()

  if(!msg) return

  addMsg(msg,"user")
  input.value=""

  typing()

  try{

    const res = await fetch(API,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({message:msg})
    })

    // 🔥 FIX: response check
    if(!res.ok){
      throw new Error("HTTP error " + res.status)
    }

    const data = await res.json()

    removeTyping()

    if(data.success){
      addMsg(data.reply,"ai")
    }else{
      addMsg("Error: "+data.error,"ai")
    }

  }catch(err){

    removeTyping()

    addMsg("⚠️ Server error. Check API deployment or internet.","ai")

    console.log(err)
  }

}

function newChat(){
  chat.innerHTML=""
}

</script>

</body>
</html>
